services:
  dot-prompt-headless:
    build:
      context: .
      dockerfile: Dockerfile.headless
    image: dot-prompt:headless
    container_name: dot-prompt-headless
    restart: unless-stopped
    ports:
      - "4001:4000"
    volumes:
      - "${PROMPT_DIR_HOST:-./prompts}:/app/prompts:ro"
    environment:
      - PORT=4000
      - DISABLE_UI=true
      - PROMPTS_DIR=/app/prompts
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-replace_with_secure_key}
      - LIVE_VIEW_SIGNING_SALT=${LIVE_VIEW_SIGNING_SALT:-replace_with_secure_salt}
      - PHX_HOST=${PHX_HOST:-localhost}
    healthcheck:
      # Healthcheck using nc should fail if Endpoint is disabled and no other service listens on 4000
      # but in Phoenix, the Endpoint starts the server. 
      # If DISABLE_UI=true, Phoenix Endpoint is not started, so port 4000 won't be open.
      # We might need an alternative health check or just rely on the process running.
      test: ["CMD", "ps", "aux", "|", "grep", "dot_prompt_umbrella"]
      interval: 10s
      timeout: 5s
      retries: 5
